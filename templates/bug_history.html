{% extends "base.html" %}

{% block content %}

<h2 class="mt-3">
Bug History
</h2>

<hr>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Bug ID</th>
<th>Old Status</th>
<th>New Status</th>
<th>Updated By</th>
</tr>

</thead>

<tbody>

{% for row in history %}

<tr>

<td>{{ row.id }}</td>
<td>{{ row.bug_id }}</td>
<td>{{ row.old_status }}</td>
<td>{{ row.new_status }}</td>
<td>{{ row.updated_by }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
