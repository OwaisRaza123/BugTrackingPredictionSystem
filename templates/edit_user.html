{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card">

            <div class="card-header">
                <h3>Edit User</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label>Name</label>
                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            value="{{ user.name }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            value="{{ user.email }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Role</label>

                        <select name="role" class="form-control">

                            <option {% if user.role=="Admin" %}selected{% endif %}>
                               Admin
                            </option>

                            <option {% if user.role=="Project Manager" %}selected{% endif %}>
                              Project Manager
                            </option>

                            <option {% if user.role=="Developer" %}selected{% endif %}>
                                Developer
                            </option>

                            <option {% if user.role=="Tester" %}selected{% endif %}>
                                Tester
                            </option>

                        </select>

                    </div>

                    <button class="btn btn-success w-100">
                        Update User
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
