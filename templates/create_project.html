{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-header">
<h3>Create Project</h3>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label>Project Name</label>
<input type="text"
name="project_name"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea
name="description"
class="form-control">
</textarea>
</div>

<div class="mb-3">
<label>Status</label>

<select
name="status"
class="form-control">

<option>Active</option>
<option>Completed</option>
<option>On Hold</option>

</select>

</div>

<button class="btn btn-primary w-100">
Create Project
</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
